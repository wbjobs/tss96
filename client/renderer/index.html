<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipSync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <h1 class="logo">⌨ ClipSync</h1>
        <span id="ws-indicator" class="status-dot disconnected" title="Disconnected"></span>
        <button class="btn btn-icon" id="btn-uploads-toggle" title="Uploads" style="margin-left:8px;">⬆<span id="upload-badge" class="upload-badge" style="display:none;">0</span></button>
      </div>
      <div class="header-right">
        <button class="btn btn-icon" id="btn-conflicts" title="Conflicts" style="display:none;">⚠<span id="conflict-badge" class="upload-badge" style="display:none;">0</span></button>
        <button class="btn btn-icon" id="btn-settings" title="Settings">⚙</button>
      </div>
    </header>

    <div id="uploads-panel" class="uploads-panel" style="display:none;">
      <div class="uploads-panel-header">
        <span>Upload Queue</span>
        <button class="btn btn-icon" id="btn-close-uploads">&times;</button>
      </div>
      <div id="uploads-list" class="uploads-list"></div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="history">History</button>
      <button class="tab" data-tab="devices">Devices</button>
      <button class="tab" data-tab="tags">Tags</button>
      <button class="tab" data-tab="conversions">Conversions</button>
    </nav>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search clips..." />
      <select id="filter-type">
        <option value="">All Types</option>
        <option value="text">Text</option>
        <option value="image">Image</option>
        <option value="file">File</option>
      </select>
    </div>

    <main class="content">
      <section id="tab-history" class="tab-panel active">
        <div id="clips-list" class="clips-list"></div>
        <div id="clips-empty" class="empty-state" style="display:none;">
          <p>No clips yet. Copy something to get started!</p>
        </div>
      </section>

      <section id="tab-devices" class="tab-panel">
        <div id="devices-list" class="devices-list"></div>
      </section>

      <section id="tab-tags" class="tab-panel">
        <div class="tag-input-row">
          <input type="text" id="new-tag-input" placeholder="New tag name..." />
          <button class="btn btn-primary" id="btn-create-tag">Create</button>
        </div>
        <div id="tags-list" class="tags-list"></div>
      </section>

      <section id="tab-conversions" class="tab-panel">
        <div class="tag-input-row">
          <button class="btn btn-primary" id="btn-new-conversion-rule">＋ New Conversion Rule</button>
        </div>
        <div id="conversion-rules-list"></div>
      </section>
    </main>

    <div id="clip-detail-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Clip Detail</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body" id="clip-detail-body"></div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="btn-copy-clip">Copy to Clipboard</button>
          <button class="btn btn-secondary" id="btn-copy-converted">Paste with Conversion</button>
          <button class="btn btn-secondary" id="btn-push-clip">Push to Device</button>
          <button class="btn btn-danger" id="btn-delete-clip">Delete</button>
        </div>
      </div>
    </div>

    <div id="push-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Push to Device</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body" id="push-device-list"></div>
      </div>
    </div>

    <div id="tag-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Manage Tags</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body" id="tag-modal-body"></div>
      </div>
    </div>

    <div id="settings-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Settings</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Server HTTP URL</label>
            <input type="text" id="setting-http-url" />
          </div>
          <div class="form-group">
            <label>Server WebSocket URL</label>
            <input type="text" id="setting-ws-url" />
          </div>
          <button class="btn btn-primary" id="btn-save-settings">Save & Reconnect</button>
        </div>
      </div>
    </div>

    <div id="conversion-rule-modal" class="modal" style="display:none;">
      <div class="modal-content" style="max-width:560px;">
        <div class="modal-header">
          <h3 id="conversion-rule-title">New Conversion Rule</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="cr-name" placeholder="e.g. Strip Line Numbers" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="cr-description" placeholder="Short description" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div class="form-group">
              <label>Source Type</label>
              <select id="cr-source-type">
                <option value="text">Text</option>
                <option value="image">Image</option>
                <option value="file">File</option>
                <option value="any">Any</option>
              </select>
            </div>
            <div class="form-group">
              <label>Target Type</label>
              <select id="cr-target-type">
                <option value="text">Text</option>
                <option value="image">Image</option>
                <option value="file">File</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Transform</label>
            <select id="cr-transform">
              <option value="regex_replace">Regex Replace</option>
              <option value="image_to_base64">Image → Base64 Data URL</option>
              <option value="file_to_base64">File → Base64</option>
              <option value="url_decode">URL Decode</option>
            </select>
          </div>
          <div id="cr-regex-fields">
            <div class="form-group">
              <label>Regex Pattern (with 'gm' flags)</label>
              <input type="text" id="cr-pattern" placeholder="e.g. ^\s*\d+\s*[|\.]?\s*" />
            </div>
            <div class="form-group">
              <label>Replacement</label>
              <input type="text" id="cr-replacement" placeholder="e.g. (leave empty to delete match)" />
            </div>
            <div class="form-group">
              <label>Test with sample text</label>
              <textarea id="cr-test-text" rows="4" placeholder="Paste sample text here to test..." style="width:100%;background:var(--bg-tertiary);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px;"></textarea>
              <div id="cr-test-result" style="margin-top:6px;font-size:12px;color:var(--text-muted);white-space:pre-wrap;word-break:break-all;"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Priority (lower = earlier)</label>
            <input type="number" id="cr-priority" value="100" min="1" max="9999" />
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:6px;">
              <input type="checkbox" id="cr-enabled" checked />
              Enabled
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary modal-close">Cancel</button>
          <button class="btn btn-primary" id="btn-save-conversion-rule">Save Rule</button>
        </div>
      </div>
    </div>

    <div id="conversion-pick-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Paste with Conversion</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body" id="conversion-pick-body"></div>
      </div>
    </div>

    <div id="conflict-modal" class="modal" style="display:none;">
      <div class="modal-content" style="max-width:700px;">
        <div class="modal-header">
          <h3>⚠ Clipboard Conflict Detected</h3>
          <button class="btn btn-icon modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-secondary);margin-bottom:14px;font-size:13px;">Two devices modified the clipboard within a short window. Choose how to resolve:</p>
          <div id="conflict-clips-container" class="conflict-clips"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="btn-keep-both">Keep Both</button>
          <button class="btn btn-primary" id="btn-resolve-latest" title="Keep the most recent clip">Keep Newest</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
